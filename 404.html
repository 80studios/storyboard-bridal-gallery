<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Not found — Storyboard Bridal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #f3f2ee;
    --babyblue: #e0eff9;
    --black: #000000;
    --darkgrey: #9a9790;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--cream); color: var(--black); }
  body {
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; }
  header {
    padding: 20px 24px;
    background: var(--cream);
    border-bottom: 1px solid rgba(154, 151, 144, 0.2);
  }
  header a {
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  main {
    flex: 1;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 64px;
  }
  .pin-image {
    width: 100%;
    height: auto;
    display: block;
    margin-bottom: 32px;
    background: var(--babyblue);
  }
  h1 {
    font-weight: 300;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: -0.005em;
    margin-bottom: 20px;
  }
  .description {
    font-size: 18px;
    line-height: 1.6;
    color: var(--black);
    margin-bottom: 28px;
  }
  .tags {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--darkgrey);
  }
  .tags span + span::before { content: ' · '; margin: 0 2px; }
  footer {
    padding: 28px 24px;
    border-top: 1px solid rgba(154, 151, 144, 0.2);
    text-align: center;
    font-size: 12px;
    color: var(--darkgrey);
    letter-spacing: 0.06em;
  }
  footer a {
    text-decoration: none;
    color: var(--black);
  }
  footer a:hover { text-decoration: underline; }
  .not-found h1 { margin-bottom: 12px; }
  .not-found p { font-size: 18px; line-height: 1.6; margin-bottom: 16px; }
  @media (min-width: 720px) {
    h1 { font-size: 42px; }
    .description { font-size: 20px; }
    main { padding: 56px 24px 80px; }
  }
</style>
</head>
<body>
<header>
  <a href="https://storyboardbridal.com">Storyboard Bridal</a>
</header>
<main class="not-found">
  <h1>Not found</h1>
  <p>That page isn&rsquo;t here. It may have moved, or it may have never existed.</p>
  <p><a href="https://pinterest.com/storyboardbridal">Back to Pinterest &rarr;</a></p>
</main>
<footer>
  <a href="https://pinterest.com/storyboardbridal">Follow on Pinterest</a>
</footer>
</body>
</html>
