<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Storyboard Bridal</title>
<meta name="description" content="Storyboard Bridal content gallery.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f3f2ee;
    --babyblue: #e0eff9;
    --black: #000000;
    --darkgrey: #9a9790;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--cream); color: var(--black); }
  body {
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; }
  header {
    padding: 20px 24px;
    background: var(--cream);
    border-bottom: 1px solid rgba(154, 151, 144, 0.2);
  }
  header a {
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  main {
    flex: 1;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px;
    text-align: center;
  }
  h1 { font-weight: 300; font-size: 36px; margin-bottom: 20px; }
  p { font-size: 18px; color: var(--black); margin-bottom: 16px; }
  p a { text-decoration: underline; }
  footer {
    padding: 28px 24px;
    border-top: 1px solid rgba(154, 151, 144, 0.2);
    text-align: center;
    font-size: 12px;
    color: var(--darkgrey);
    letter-spacing: 0.06em;
  }
  footer a { text-decoration: none; color: var(--black); }
  footer a:hover { text-decoration: underline; }
  @media (min-width: 720px) {
    h1 { font-size: 48px; }
    p { font-size: 20px; }
  }
</style>
</head>
<body>
<header>
  <a href="https://storyboardbridal.com">Storyboard Bridal</a>
</header>
<main>
  <h1>Storyboard Bridal</h1>
  <p>Find the pins, moodboards, and bridal reference behind this collection on <a href="https://pinterest.com/storyboardbridal">Pinterest</a>.</p>
  <p>Or visit the main site at <a href="https://storyboardbridal.com">storyboardbridal.com</a>.</p>
</main>
<footer>
  <a href="https://pinterest.com/storyboardbridal">Follow on Pinterest</a>
</footer>
</body>
</html>
